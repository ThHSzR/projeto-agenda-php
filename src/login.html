<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Login — Agenda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #ccc; border-radius: 6px;
            padding: 32px; width: 100%; max-width: 340px; }
    h2 { margin-bottom: 20px; font-size: 1.2rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; padding: 8px; border: 1px solid #bbb; border-radius: 4px; font-size: 1rem; }
    button { margin-top: 20px; width: 100%; padding: 10px;
             background: #2563eb; color: #fff; border: none;
             border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #erro { margin-top: 12px; color: #dc2626; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login</h2>
    <label>Usuário</label>
    <input type="text" id="usuario" autocomplete="username" />
    <label>Senha</label>
    <input type="password" id="senha" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') logar()" />
    <button onclick="logar()">Entrar</button>
    <p id="erro"></p>
  </div>
  <script>
    // Se já está logado, vai direto
    fetch('/api/me', { credentials: 'same-origin' })
      .then(r => { if (r.ok) location.href = '/src/index.html'; });

    async function logar() {
      const usuario = document.getElementById('usuario').value.trim();
      const senha   = document.getElementById('senha').value;
      const erro    = document.getElementById('erro');
      erro.style.display = 'none';

      if (!usuario || !senha) {
        erro.textContent = 'Preencha usuário e senha.';
        erro.style.display = 'block';
        return;
      }

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ usuario, senha })
      });

      const data = await res.json();
      if (res.ok) {
        location.href = '/src/index.html';
      } else {
        erro.textContent = data.erro || 'Erro ao fazer login.';
        erro.style.display = 'block';
        document.getElementById('senha').value = '';
      }
    }
  </script>
</body>
</html>
