<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Entrar | Beauty &amp; Beauty</title>
  <link rel="stylesheet" href="./css/style.css?v=20260714.release">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand" aria-label="Beauty &amp; Beauty">
      <img src="./logo.png" alt="Beauty &amp; Beauty — depilação a laser e estética">
      <p>Agenda e atendimento em um só lugar.</p>
    </section>

    <section class="login-card" aria-labelledby="login-title">
      <div class="login-heading">
        <span class="login-eyebrow">Área restrita</span>
        <h1 id="login-title">Bem-vindo de volta</h1>
        <p>Entre com seus dados para acessar a agenda.</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary login-submit" id="btn-entrar" type="submit">Entrar</button>
        <p id="erro" class="login-error" role="alert" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="./js/login.js?v=20260714.release" defer></script>
</body>
</html>
