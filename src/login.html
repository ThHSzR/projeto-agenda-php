<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Login — Agenda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #ccc; border-radius: 6px;
            padding: 32px; width: 100%; max-width: 340px; }
    h2 { margin-bottom: 20px; font-size: 1.2rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; padding: 8px; border: 1px solid #bbb; border-radius: 4px; font-size: 1rem; }
    button { margin-top: 20px; width: 100%; padding: 10px;
             background: #2563eb; color: #fff; border: none;
             border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    #erro { margin-top: 12px; color: #dc2626; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login</h2>
    <label>Usuário</label>
    <input type="text" id="usuario" autocomplete="username" />
    <label>Senha</label>
    <input type="password" id="senha" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') logar()" />
    <button id="btn-entrar" onclick="logar()">Entrar</button>
    <p id="erro"></p>
  </div>
  <script>
    // Calcula base path dinamicamente — funciona em qualquer subpasta
    const _basePath = location.pathname.replace(/\/src\/.*$/, '');
    const _isLocal  = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    // URL da API: usa api.php direto em dev (igual ao api.js) — evita dependência do .htaccess
    function apiUrl(rota) {
      return _isLocal
        ? `${_basePath}/api.php?_route=${rota}`
        : `/api/${rota}`;
    }

    // Se já está logado, vai direto para a app
    fetch(apiUrl('me'), { credentials: 'same-origin' })
      .then(r => { if (r.ok) location.href = `${_basePath}/src/index.html`; })
      .catch(() => { /* ignora — permanece na tela de login */ });

    async function logar() {
      const usuario = document.getElementById('usuario').value.trim();
      const senha   = document.getElementById('senha').value;
      const erro    = document.getElementById('erro');
      const btn     = document.getElementById('btn-entrar');

      erro.style.display = 'none';

      if (!usuario || !senha) {
        erro.textContent = 'Preencha usuário e senha.';
        erro.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res  = await fetch(apiUrl('login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ usuario, senha }),
        });

        const data = await res.json();

        if (res.ok) {
          location.href = `${_basePath}/src/index.html`;
        } else {
          erro.textContent = data.erro || 'Erro ao fazer login.';
          erro.style.display = 'block';
          document.getElementById('senha').value = '';
        }
      } catch (e) {
        erro.textContent = 'Não foi possível conectar ao servidor.';
        erro.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
