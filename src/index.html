<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agenda</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
</head>

<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="./logo.png" alt="Logo" class="logo" />
      </div>
      <nav>
        <button class="nav-btn active" data-page="calendario">📅 Calendário</button>
        <button class="nav-btn" data-page="agendamentos">📋 Agendamentos</button>
        <button class="nav-btn" data-page="clientes">👤 Clientes</button>
        <button class="nav-btn gerente-only hidden" data-page="procedimentos">💆 Procedimentos</button>
        <button class="nav-btn gerente-only hidden" data-page="financeiro">💰 Financeiro</button>
        <button class="nav-btn admin-only hidden" data-page="usuarios">⚙️ Usuários</button>
      </nav>
      <div class="sidebar-footer">
        <span id="usuario-logado"></span>
        <button id="btn-logout">Sair</button>
      </div>
    </aside>

    <!-- Conteúdo principal -->
    <main id="main-content"></main>
  </div>

  <!-- Scripts -->
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/clientes.js"></script>
  <script src="./js/procedimentos.js"></script>
  <script src="./js/agendamentos.js"></script>
  <script src="./js/financeiro.js"></script>
  <script src="./js/usuarios.js"></script>
  <script src="./js/calendario.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
